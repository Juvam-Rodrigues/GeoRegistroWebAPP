<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoRegistro</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/stylelogin.css">
    <link rel="stylesheet" href="css/add_coordenadas.css">
    <link rel="icon" href="images/icone.png" type="image/x-icon">
    <script src="js/obter_coordenadas.js"></script>
    <script src="js/enviar_coordenadas.js"></script>

</head>

<body>

    <div class="container-fluid p-0 min-vh-100 d-flex flex-column">

        <!-- HEADER -->
        <nav class="navbar navbar-expand-lg navbar-light px-3 px-md-5 py-3">
            <div class="container-fluid">

                <a class="navbar-brand" href="#">
                    <img
                        src="images/logoGeo.png"
                        alt="Logo GeoRegistro"
                        class="img-fluid"
                        style="max-width: 145px;">
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu"
                    aria-controls="menu"
                    aria-expanded="false"
                    aria-label="Abrir menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <div class="ms-auto d-flex flex-column flex-lg-row align-items-lg-center gap-3">

                        <a class="btn btn-primary registrarT" href="#" id="btnCadastrarTerreno">
                            Registrar terreno
                        </a>

                    </div>
                </div>

            </div>
        </nav>

        <!-- CONTEÚDO -->
        <main class="flex-grow-1 d-flex align-items-center justify-content-center px-3">

            <form class="border border-dark rounded p-4 p-md-5 w-100" style="max-width: 700px;" id="formCoordenadas">

                <h5 class="text-center mb-2 titulo mt-0">
                    Registrar Terreno
                </h5>

                <p class="text-center mb-4 text-muted small">
                    Posicione-se em cada vértice do terreno e pressione “Capturar” para registrar a coordenada.
                </p>        

                <div id="lista-pontos">
                    <div class="mb-3">
                        <label class="form-label">Ponto 1</label>

                        <div class="d-flex gap-2 linha-ponto">
                            <input
                                type="text"
                                name="coordenadas[]"
                                class="form-control coordenada"
                                placeholder="Coordenada">

                            <button type="button" class="btn cadastrobtn">
                                Capturar
                            </button>
                        </div>
                    </div>
                </div>
    

            </form>

        </main>

        <!-- FOOTER -->
        <footer class="py-3 text-center">
            <span id="texto-footer">
                © Todos os direitos reservados à Bianca Jennifer, Juvam Rodrigues e Lucas Estanislau
            </span>
        </footer>

    </div>

</body>

</html>
