<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoRegistro</title>

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="css/stylecadastro.css">
    <link rel="icon" href="images/LogoOficial.svg" type="image/x-icon">
</head>

<body>

    <div class="container-fluid p-0 min-vh-100 d-flex flex-column">

        <!-- HEADER -->
        <nav class="navbar navbar-expand-lg navbar-light px-3 px-md-5 py-3">
            <div class="container-fluid">

                <a class="navbar-brand" href="#">
                    <img
                        src="images/logoGeo.png"
                        alt="Logo GeoRegistro"
                        class="img-fluid"
                        style="max-width: 145px;">
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu"
                    aria-controls="menu"
                    aria-expanded="false"
                    aria-label="Abrir menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <div class="ms-auto d-flex flex-column flex-lg-row align-items-lg-center gap-3">

                        <a class="nav-link" href="index.html">
                            Login
                        </a>

                        <a class="nav-link" href="cadastrarconta.html">
                            Cadastre-se
                        </a>

                    </div>
                </div>

            </div>
        </nav>

        <!-- CONTEÚDO -->
        <main class="flex-grow-1 d-flex align-items-center justify-content-center px-3">

            <form id="formCadastro" class="border border-dark rounded p-4 p-md-5 w-100" style="max-width: 700px;">

                <h3 class="text-center mb-4 titulo">
                    Cadastro
                </h3>

                <div class="mb-3">
                    <label class="form-label">Nome completo</label>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="Digite seu nome completo" id="nome" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input
                        type="email"
                        class="form-control"
                        placeholder="Digite seu email" id="email" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input
                        type="password"
                        class="form-control"
                        placeholder="Digite sua senha" id="senha" required>
                </div>

                <div class="row g-2 align-items-center">

                    <div class="col-12 col-md">
                        <button type="submit" class="btn cadastrobtn w-100">
                            Cadastrar
                        </button>
                    </div>

                    <div class="col-12 col-md-auto text-center">
                        <span class="text-muted small">OU</span>
                    </div>

                    <div class="col-12 col-md">
                        <a href="index.html" class="btn loginbtn w-100">
                           Login
                        </a>
                    </div>

                </div>

            </form>

        </main>

        <!-- FOOTER -->
        <footer class="py-3 text-center">
            <span id="texto-footer">
                © Todos os direitos reservados à Bianca Jennifer, Juvam Rodrigues e Lucas Estanislau
            </span>
        </footer>

    </div>

    <script src="js/enviar_cadastro.js"></script>
</body>

</html>
