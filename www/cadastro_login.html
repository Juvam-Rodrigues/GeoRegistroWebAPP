<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoRegistro</title>
  <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
  <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/LogoOficial.svg" type="image/x-icon">
</head>

<body>
  <!-- HEADER -->
    <nav class="navbar navbar-expand-lg mx-2 mx-md-5 mt-3">
        <div class="container-fluid">

           
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="images/logo.png" id="imagem-logo" alt="Logo" width="40" height="40">
                <div id="div-texto-logo">
                    <span id="texto-logo">GeoRegistro</span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

           
           <div class="collapse navbar-collapse" id="menu">
                <div class="ms-auto d-flex flex-column flex-lg-row align-items-lg-center gap-4">
                    <a class="nav-link" href="#">Login</a>
                    <a class="nav-link ms-lg-3" href="#">Cadastre-se</a>
                    <a class="btn btn-primary ms-lg-3 mt-2 mt-lg-0 registrarT" href="#">
                        Registrar terreno
                    </a>
                </div>
            </div>

        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-10 col-md-8 col-lg-5 col-xl-4">

                <form class="border rounded-4 p-4 border-1 border-dark">
                    <h6 class="text-center mb-4 titulo">Cadastro</h6>

                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" placeholder="Digite seu nome">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Digite seu email">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-control" placeholder="Digite sua senha">
                    </div>

                    <div class="row align-items-center g-2">
                        <div class="col">
                            <button type="submit" class="btn cadastrobtn w-100">
                                Cadastre-se
                            </button>
                        </div>

                        <div class="col-auto">
                            <span class="text-muted small">OU</span>
                        </div>

                        <div class="col">
                            <a href="login.html" class="btn loginbtn w-100">
                                Login
                            </a>
                        </div>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="row g-0">
      <div class="col-12 ">
        <footer class="py-3">
          <div id="div-texto-footer" class="text-center"> <span id="texto-footer"> @ Todos os direitos reservados à
            Bianca Jennifer, Juvam Rodrigues, Lucas Estanislau </span> </div>
        </footer>
      </div>
    </div>
  <script src="script.js"></script>
</body>

</html>
